<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NauticShield Cloud API</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #080c12;
        color: #e7f6ff;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      .card {
        width: min(680px, 92vw);
        background: linear-gradient(160deg, #0f1722, #0b1119);
        border: 1px solid #1f2d3d;
        border-radius: 14px;
        padding: 24px;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.35rem;
      }

      p {
        margin: 0 0 12px;
        color: #b8ccdd;
      }

      code {
        display: inline-block;
        background: #0a2533;
        border: 1px solid #184961;
        color: #8ee3ff;
        border-radius: 8px;
        padding: 4px 8px;
      }

      a {
        color: #59d4ff;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>NauticShield Cloud API</h1>
      <p>Service is running.</p>
      <p>Health endpoint: <a href="/api/health"><code>/api/health</code></a></p>
    </main>
  </body>
</html>
